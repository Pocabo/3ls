<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="3Ls">
  <!-- maskable: 안전영역 확보를 위해 전체 배경 + 중앙에 여백을 두고 로고 배치 -->
  <rect width="512" height="512" fill="#3b5bdb"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI','Apple SD Gothic Neo',Arial,sans-serif"
        font-size="200" font-weight="800" fill="#ffffff" letter-spacing="-6">3Ls</text>
</svg>
